{% load i18n %}
{% load static %}

{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <header class="bg-white border-bottom shadow-sm mb-4">
    <div class="container d-flex align-items-center py-2">
        <a href="{% url 'home' %}" class="d-flex align-items-center text-decoration-none">
        <img src="{% static 'img/logo.png' %}" alt="Logo" width="60" height="60" class="me-2">
        <h1 class="h4 mb-0 text-dark fw-bold">{% trans "Highland Cultural Heritage Research Centre" %}</h1>
        </a>
        <div class="ms-auto">
        <!-- Language Switch Buttons Here -->
        <button class="btn btn-sm {% if LANGUAGE_CODE == 'en' %}btn-primary{% else %}btn-outline-secondary{% endif %} me-2"
                hx-get="{% url 'switch_language' %}?lang=en"
                hx-swap="none"
                onclick="setTimeout(() => location.reload(), 100);">
            English 🇬🇧
        </button>

        <button class="btn btn-sm {% if LANGUAGE_CODE == 'ka' %}btn-primary{% else %}btn-outline-secondary{% endif %}"
                hx-get="{% url 'switch_language' %}?lang=ka"
                hx-swap="none"
                onclick="setTimeout(() => location.reload(), 100);">
            ქართული 🇬🇪
        </button>
        </div>
    </div>
    </header>

    <title>{% block title %}HCH{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>


    <!-- Page content -->
    <div id="content" class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.querySelector('select[name="lang"]').addEventListener('change', function () {
        setTimeout(() => location.reload(), 100);
    });
    </script>

</body>
</html>
